<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数学乐园</title>
<style>
/* ===== CSS Reset & Global ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}

:root {
  --bg-primary: #FFFDE7;
  --bg-secondary: #FFF8E1;
  --bg-game: linear-gradient(180deg, #FFFDE7 0%, #FFF8E1 50%, #FFF3E0 100%);
  --color-accent: #FFB300;
  --color-accent-light: #FFD54F;
  --color-accent-dark: #FF8F00;
  --color-mint: #7DDCBA;
  --color-yellow: #FFD93D;
  --color-purple: #C9A5F7;
  --color-blue: #87CEEB;
  --color-orange: #FFB067;
  --color-correct: #4CAF50;
  --color-wrong: #FF6B6B;
  --color-text: #5D4037;
  --color-text-light: #8D6E63;
  --color-white: #FFFFFF;
  --color-timer-ok: #7DDCBA;
  --color-timer-warn: #FFD93D;
  --color-timer-danger: #FF6B6B;
  --radius: 16px;
  --radius-lg: 24px;
  --radius-full: 50%;
  --shadow: 0 4px 15px rgba(0,0,0,0.08);
  --shadow-btn: 0 4px 12px rgba(255,179,0,0.3);
}

/* ===== Screen System ===== */
.screen {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-game);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.screen.active { display: flex; }

/* ===== Start Screen ===== */
#screen-start {
  gap: 20px;
  padding: 40px 20px;
}
.start-title {
  font-size: 32px;
  font-weight: 800;
  color: var(--color-accent);
  text-shadow: 2px 2px 0 rgba(255,179,0,0.2);
  text-align: center;
  animation: float 3s ease-in-out infinite;
}
.start-subtitle {
  font-size: 16px;
  color: var(--color-text-light);
  margin-top: -10px;
}
.mode-grid {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  max-width: 300px;
  margin-top: 10px;
}
.mode-btn {
  padding: 18px 24px;
  border-radius: var(--radius);
  border: 3px solid var(--color-accent);
  background: var(--color-white);
  color: var(--color-accent);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.mode-btn:active { transform: scale(0.96); }
.mode-btn.active-mode {
  background: var(--color-accent);
  color: white;
}
.mode-btn:disabled {
  border-color: #ddd;
  color: #bbb;
  background: #f5f5f5;
  cursor: not-allowed;
  box-shadow: none;
}

/* ===== Game Screen ===== */
#screen-game {
  justify-content: flex-start;
  padding: 0;
}
.game-container {
  width: 100%;
  max-width: 500px;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 12px 16px;
  margin: 0 auto;
}

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0 8px;
  flex-shrink: 0;
}
.level-label {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text);
}
.sound-toggle {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  border: 2px solid var(--color-accent-light);
  background: var(--color-white);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}
.sound-toggle.muted { opacity: 0.4; }

/* Progress Ring */
.progress-wrap {
  display: flex; align-items: center; gap: 8px;
}
.progress-ring-svg {
  width: 40px; height: 40px;
  transform: rotate(-90deg);
}
.progress-ring-bg {
  fill: none; stroke: #F0E4C8; stroke-width: 3;
}
.progress-ring-fg {
  fill: none; stroke: var(--color-accent); stroke-width: 3;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.4s ease;
}
.progress-text {
  font-size: 14px; font-weight: 600; color: var(--color-text-light);
}

/* Timer Bar */
.timer-bar-container {
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: #F0E4C8;
  margin: 6px 0 10px;
  flex-shrink: 0;
  overflow: hidden;
}
.timer-bar {
  height: 100%;
  border-radius: 4px;
  background: var(--color-timer-ok);
  transition: width 0.1s linear, background-color 0.3s;
  width: 100%;
}
.timer-bar.warn { background: var(--color-timer-warn); }
.timer-bar.danger { background: var(--color-timer-danger); animation: pulse 0.5s ease-in-out infinite; }

.timer-text {
  font-size: 15px; font-weight: 700; color: var(--color-text);
  min-width: 30px; text-align: center;
}

/* Question Area */
.question-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  min-height: 0;
}
.question-text {
  font-size: 32px;
  font-weight: 800;
  color: var(--color-text);
  text-align: center;
  padding: 10px 16px;
  letter-spacing: 2px;
  word-break: break-all;
}
.question-text.shake { animation: shake 0.4s; }
.question-text.fadeInUp { animation: fadeInUp 0.3s; }

/* Answer Display */
.answer-display {
  min-width: 120px;
  height: 56px;
  border-radius: var(--radius);
  border: 3px solid var(--color-accent-light);
  background: var(--color-white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 800;
  color: var(--color-text);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.05);
  position: relative;
  padding: 0 16px;
}
.answer-display.correct {
  border-color: var(--color-correct);
  background: #E8F5E9;
  color: var(--color-correct);
}
.answer-display.wrong {
  border-color: var(--color-wrong);
  background: #FFEBEE;
  color: var(--color-wrong);
}
.answer-cursor {
  display: inline-block;
  width: 2px; height: 28px;
  background: var(--color-accent);
  animation: blink 1s step-end infinite;
  margin-left: 2px;
}
.answer-display.has-input .answer-cursor { display: none; }

/* Correct Answer Reveal */
.correct-answer-reveal {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-correct);
  margin-top: 4px;
  min-height: 28px;
}

/* Nailong Character */
.character-area {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  height: 110px;
  margin: 4px 0;
}
.character-img {
  max-height: 100px;
  width: auto;
  object-fit: contain;
  animation: float 3s ease-in-out infinite;
}
.character-img.happy { animation: bounce 0.5s ease; }
.character-img.celebrate { animation: celebrate 0.6s ease infinite; }

/* Keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 8px 0 16px;
  flex-shrink: 0;
  max-width: 320px;
  margin: 0 auto;
  width: 100%;
}
.key-btn {
  height: 54px;
  border-radius: 14px;
  border: 2px solid #E8DCBE;
  background: var(--color-white);
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.06);
}
.key-btn:active {
  transform: scale(0.94);
  background: #FFF8E1;
}
.key-btn.key-delete {
  background: #FFF0E6;
  border-color: var(--color-orange);
  color: var(--color-orange);
  font-size: 22px;
}
.key-btn.key-confirm {
  background: var(--color-mint);
  border-color: #5BC8A0;
  color: white;
  font-size: 26px;
}
.key-btn.key-confirm:active { background: #5BC8A0; }
.key-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ===== Level Complete Screen ===== */
#screen-level-complete, #screen-game-complete {
  gap: 16px;
  padding: 40px 20px;
}
.result-title {
  font-size: 30px;
  font-weight: 800;
  color: var(--color-accent);
  text-align: center;
}
.result-stats {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  margin: 10px 0;
}
.overall-progress {
  width: 80%;
  max-width: 300px;
  margin: 4px auto 8px;
  text-align: center;
}
.overall-progress-label {
  font-size: 16px;
  color: var(--color-text);
  font-weight: 600;
  margin-bottom: 6px;
}
.overall-progress-bar {
  width: 100%;
  height: 14px;
  background: #f0e4c8;
  border-radius: 7px;
  overflow: hidden;
}
.overall-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFB300, #FFB347);
  border-radius: 7px;
  transition: width 0.6s ease;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  color: var(--color-text);
  font-weight: 600;
}
.stat-icon { font-size: 24px; }
.stat-value { color: var(--color-accent-dark); }

.result-btn {
  padding: 16px 40px;
  border-radius: var(--radius);
  border: none;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-btn);
  min-width: 200px;
}
.result-btn:active { transform: scale(0.96); }
.btn-primary {
  background: var(--color-accent);
  color: white;
}
.btn-secondary {
  background: var(--color-white);
  color: var(--color-accent);
  border: 2px solid var(--color-accent);
  box-shadow: var(--shadow);
}

/* ===== Reward Screen ===== */
#screen-reward {
  gap: 16px;
  padding: 40px 20px;
}
.reward-title {
  font-size: 30px;
  font-weight: 800;
  color: var(--color-accent);
  text-align: center;
}
.reward-box {
  width: 180px;
  height: 180px;
  border-radius: 22px;
  border: 4px solid #FFD54F;
  background: linear-gradient(180deg, #FFFDE7 0%, #FFF8E1 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  box-shadow: var(--shadow-btn);
}
.reward-hint {
  font-size: 16px;
  color: var(--color-text-light);
}
.reward-result {
  min-height: 52px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 2px dashed #FFD54F;
  background: rgba(255,255,255,0.78);
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text);
  text-align: center;
  max-width: 360px;
}
.reward-result .rarity-common { color: #8D6E63; }
.reward-result .rarity-rare { color: #7E57C2; }
.reward-result .rarity-super { color: #E91E63; }

/* ===== Rest Screen ===== */
#screen-rest {
  gap: 24px;
  padding: 40px 20px;
}
.rest-text {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text-light);
}

/* ===== Stars/Overall Stats ===== */
.stars-row {
  display: flex; gap: 6px; margin: 8px 0;
}
.star {
  font-size: 32px;
  animation: starPop 0.3s ease backwards;
}
.star:nth-child(1) { animation-delay: 0.1s; }
.star:nth-child(2) { animation-delay: 0.2s; }
.star:nth-child(3) { animation-delay: 0.3s; }
.star:nth-child(4) { animation-delay: 0.4s; }
.star:nth-child(5) { animation-delay: 0.5s; }

.overall-stats { text-align: center; }
.overall-stats .stat-item { justify-content: center; }

/* ===== Confetti ===== */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 100;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -10px;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 1.5s ease-out forwards;
}

/* ===== Feedback Toast ===== */
.feedback-toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  padding: 16px 32px;
  border-radius: var(--radius-lg);
  font-size: 24px;
  font-weight: 800;
  z-index: 90;
  pointer-events: none;
  animation: toastPop 0.8s ease forwards;
}
.feedback-toast.correct {
  background: #E8F5E9; color: var(--color-correct);
  border: 3px solid var(--color-correct);
}
.feedback-toast.wrong {
  background: #FFEBEE; color: var(--color-wrong);
  border: 3px solid var(--color-wrong);
}
.feedback-toast.retry {
  background: #FFF8E1; color: #F9A825;
  border: 3px solid #F9A825;
}

/* ===== Animations ===== */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes bounce {
  0% { transform: translateY(0); }
  30% { transform: translateY(-20px); }
  50% { transform: translateY(0); }
  70% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes wiggle {
  0%, 100% { transform: rotate(0); }
  20% { transform: rotate(-8deg); }
  40% { transform: rotate(8deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(5deg); }
}
@keyframes celebrate {
  0%, 100% { transform: translateY(0) scale(1); }
  25% { transform: translateY(-14px) scale(1.05); }
  50% { transform: translateY(0) scale(1); }
  75% { transform: translateY(-8px) scale(1.02); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes confettiFall {
  0% {
    transform: translateY(0) rotate(0deg) translateX(var(--x-drift, 0px));
    opacity: 1;
  }
  100% {
    transform: translateY(calc(100vh + 20px)) rotate(var(--rotate, 720deg)) translateX(var(--x-drift, 30px));
    opacity: 0;
  }
}
@keyframes toastPop {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  40% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
}
@keyframes starPop {
  from { transform: scale(0) rotate(-30deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}

/* ===== Wrong Review Fullscreen ===== */
#screen-wrong-review {
  gap: 0;
  padding: 20px;
  justify-content: flex-start;
}
.wrong-review-header {
  font-size: 26px;
  font-weight: 800;
  color: var(--color-accent);
  text-align: center;
  padding: 16px 0 12px;
  flex-shrink: 0;
}
.wrong-review-list {
  flex: 1;
  width: 100%;
  max-width: 460px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 0;
}
.wrong-review-card {
  background: rgba(255,255,255,0.85);
  border: 2px solid #E8D8BE;
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 10px;
}
.wrong-review-card-question {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 6px;
}
.wrong-review-card-answers {
  font-size: 15px;
  color: var(--color-text-light);
  line-height: 1.6;
}
.wrong-review-empty-state {
  text-align: center;
  font-size: 18px;
  color: var(--color-text-light);
  padding: 40px 0;
}
.wrong-review-back-btn {
  flex-shrink: 0;
  margin-top: 12px;
}

/* ===== Reward Box Animations ===== */
@keyframes nudge {
  0%, 100% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(-2deg) scale(1.02); }
  75% { transform: rotate(2deg) scale(1.02); }
}
@keyframes violentShake {
  0%, 100% { transform: translate(0,0) rotate(0deg); }
  10% { transform: translate(-8px, -4px) rotate(-6deg); }
  20% { transform: translate(8px, 2px) rotate(6deg); }
  30% { transform: translate(-6px, 4px) rotate(-4deg); }
  40% { transform: translate(6px, -2px) rotate(4deg); }
  50% { transform: translate(-4px, 2px) rotate(-2deg); }
  60% { transform: translate(4px, -4px) rotate(3deg); }
  70% { transform: translate(-6px, 2px) rotate(-5deg); }
  80% { transform: translate(6px, -2px) rotate(5deg); }
  90% { transform: translate(-2px, 4px) rotate(-1deg); }
}
.reward-box.nudging {
  animation: nudge 1.5s ease-in-out infinite;
  cursor: pointer;
}
.reward-box.shaking {
  animation: violentShake 0.6s ease-in-out;
}
.reward-encouragement {
  font-size: 17px;
  font-weight: 700;
  color: var(--color-accent-dark);
  margin-top: 4px;
  min-height: 24px;
  text-align: center;
}

/* ===== Responsive ===== */
@media (min-width: 600px) {
  .start-title { font-size: 40px; }
  .question-text { font-size: 42px; }
  .answer-display { min-width: 160px; height: 64px; font-size: 36px; }
  .key-btn { height: 62px; font-size: 26px; }
  .keypad { gap: 10px; max-width: 360px; }
  .character-area { height: 130px; }
  .character-img { max-height: 120px; }
}
@media (min-width: 900px) {
  .game-container { max-width: 560px; }
}
</style>
</head>
<body>

<!-- ===== Screen: Start ===== -->
<div id="screen-start" class="screen active">
  <div class="start-title">数学乐园</div>
  <div class="start-subtitle">每天进步一点点，数学变得好简单</div>

  <div class="character-area">
    <img class="character-img" src="images/nailong-sayhi.png" alt="小奶龙">
  </div>

  <div class="mode-grid">
    <button class="mode-btn active-mode" id="btn-mode-within20">20以内加减法</button>
    <button class="mode-btn" id="btn-mode-within50">50以内加减法</button>
    <button class="mode-btn" id="btn-mode-within100">100以内加减法</button>
  </div>
</div>

<!-- ===== Screen: Game ===== -->
<div id="screen-game" class="screen">
  <div class="game-container">
    <!-- Top Bar -->
    <div class="top-bar">
      <span class="level-label" id="level-label">第1关</span>
      <button class="sound-toggle" id="sound-toggle" title="音效开关">🔊</button>
      <div class="progress-wrap">
        <svg class="progress-ring-svg" viewBox="0 0 40 40">
          <circle class="progress-ring-bg" cx="20" cy="20" r="17"/>
          <circle class="progress-ring-fg" id="progress-ring" cx="20" cy="20" r="17"
                  stroke-dasharray="106.81" stroke-dashoffset="106.81"/>
        </svg>
        <span class="progress-text" id="progress-text">0/20</span>
      </div>
    </div>

    <!-- Timer -->
    <div class="timer-bar-container">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <!-- Question Area -->
    <div class="question-area">
      <div class="question-text" id="question-text">10 + 5 =</div>
      <div class="answer-display" id="answer-display">
        <span id="answer-text"></span><span class="answer-cursor"></span>
      </div>
      <div class="correct-answer-reveal" id="correct-answer-reveal"></div>
    </div>

    <!-- Nailong Character -->
    <div class="character-area">
      <img class="character-img" id="game-character" src="images/nailong-curious.png" alt="小奶龙">
    </div>

    <!-- Keypad -->
    <div class="keypad" id="keypad">
      <button class="key-btn" data-key="1">1</button>
      <button class="key-btn" data-key="2">2</button>
      <button class="key-btn" data-key="3">3</button>
      <button class="key-btn" data-key="4">4</button>
      <button class="key-btn" data-key="5">5</button>
      <button class="key-btn" data-key="6">6</button>
      <button class="key-btn" data-key="7">7</button>
      <button class="key-btn" data-key="8">8</button>
      <button class="key-btn" data-key="9">9</button>
      <button class="key-btn key-delete" data-key="delete">⌫</button>
      <button class="key-btn" data-key="0">0</button>
      <button class="key-btn key-confirm" data-key="confirm">✓</button>
    </div>
  </div>
</div>

<!-- ===== Screen: Reward ===== -->
<div id="screen-reward" class="screen">

<script>
/* ================================================================
   数学乐园 - JavaScript
   ================================================================ */

// ===== Utilities =====
function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ===== Game State =====
const GS = {
  mode: 'within20',
  totalLevels: 4,
  questionsPerLevel: 20,
  timePerQuestion: 15,

  currentScreen: 'start',
  currentLevel: 1,
  currentQuestion: 0, // 1-based index of current question
  questions: [],
  wrongQuestions: [],
  currentInput: '',
  lastWrongInput: null,
  isRetry: false,
  inputLocked: false,
  timerInterval: null,
  questionStartTime: null,
  pendingLevelTransition: 'next-level',
  currentReward: null,
  rewardHistory: [],

  levelStats: { correct: 0, wrong: 0, totalTime: 0, firstTryCorrect: 0 },
  overallStats: { levels: [], gameStartTime: null },

  audioEnabled: true,
  audioCtx: null,
  speechReady: false,
  zhVoice: null,
  lastPhraseIndex: -1,
  bgmAudio: null,
  currentBgmKey: null,
};

// ===== Mode Config =====
const ModeConfig = {
  within20:  { max: 20, maxDigits: 2, label: '20以内加减法' },
  within50:  { max: 50, maxDigits: 2, label: '50以内加减法' },
  within100: { max: 100, maxDigits: 3, label: '100以内加减法' },
};

// ===== Question Generator =====
const QuestionGenerator = {
  getMax() { return (ModeConfig[GS.mode] || ModeConfig.within20).max; },

  generateAddition() {
    const max = this.getMax();
    // Both operands >= 3 to avoid trivially simple questions like 2+1, 3+3
    const answer = randomInt(6, max);
    const a = randomInt(3, answer - 3);
    const b = answer - a;
    return { operands: [a, b], operators: ['+'], answer, display: `${a} + ${b} =` };
  },

  // Specifically generate carry additions (进位加法): a%10 + b%10 >= 10
  generateCarryAddition() {
    const max = this.getMax();
    for (let attempt = 0; attempt < 100; attempt++) {
      const answer = randomInt(11, max);
      const a = randomInt(3, answer - 3);
      const b = answer - a;
      if ((a % 10) + (b % 10) >= 10 && a >= 3 && b >= 3) {
        return { operands: [a, b], operators: ['+'], answer, display: `${a} + ${b} =` };
      }
    }
    return this.generateAddition();
  },

  generateSubtraction() {
    const max = this.getMax();
    // Ensure a >= 5, b >= 2, and answer >= 1 (answer=0 handled by quota in generateLevelQuestions)
    const a = randomInt(5, max);
    const b = randomInt(2, Math.max(2, a - 1));
    const answer = a - b;
    return { operands: [a, b], operators: ['-'], answer, display: `${a} - ${b} =` };
  },

  // Specifically generate borrow subtractions (退位减法): a%10 < b%10
  generateBorrowSubtraction() {
    const max = this.getMax();
    for (let attempt = 0; attempt < 100; attempt++) {
      const a = randomInt(11, max);
      const b = randomInt(2, a);
      if ((a % 10) < (b % 10) && (a - b) >= 0) {
        const answer = a - b;
        return { operands: [a, b], operators: ['-'], answer, display: `${a} - ${b} =` };
      }
    }
    return this.generateSubtraction();
  },

  generateChained() {
    const max = this.getMax();
    const ops = [Math.random() < 0.5 ? '+' : '-', Math.random() < 0.5 ? '+' : '-'];
    for (let attempt = 0; attempt < 300; attempt++) {
      const a = randomInt(2, max - 4);
      let mid, b;
      if (ops[0] === '+') {
        if (max - a < 2) continue;
        b = randomInt(2, max - a);
        mid = a + b;
      } else {
        if (a < 4) continue;
        b = randomInt(2, a - 2);
        mid = a - b;
      }
      let c, answer;
      if (ops[1] === '+') {
        if (max - mid < 2) continue;
        c = randomInt(2, max - mid);
        answer = mid + c;
      } else {
        if (mid < 2) continue;
        c = randomInt(2, mid);
        answer = mid - c;
      }
      if (answer >= 0 && answer <= max) {
        const display = `${a} ${ops[0]} ${b} ${ops[1]} ${c} =`;
        return { operands: [a, b, c], operators: ops, answer, display };
      }
    }
    return this.generateAddition(); // fallback
  },

  // Three-operator chained: a op1 b op2 c op3 d = ?
  generateLongChained() {
    const max = this.getMax();
    for (let attempt = 0; attempt < 300; attempt++) {
      const ops = [
        Math.random() < 0.5 ? '+' : '-',
        Math.random() < 0.5 ? '+' : '-',
        Math.random() < 0.5 ? '+' : '-'
      ];
      const a = randomInt(2, Math.min(max - 6, Math.floor(max * 0.8)));
      let val = a, operands = [a];

      let ok = true;
      for (let i = 0; i < 3; i++) {
        let num;
        if (ops[i] === '+') {
          if (max - val < 2) { ok = false; break; }
          num = randomInt(2, Math.min(max - val, Math.floor(max * 0.4)));
          val += num;
        } else {
          if (val < 2) { ok = false; break; }
          num = randomInt(2, Math.min(val, Math.floor(max * 0.4)));
          val -= num;
        }
        if (val < 0 || val > max) { ok = false; break; }
        operands.push(num);
      }
      if (!ok || val < 0 || val > max) continue;
      const display = operands.map((n, i) => i === 0 ? `${n}` : `${ops[i-1]} ${n}`).join(' ') + ' =';
      return { operands, operators: ops, answer: val, display };
    }
    return this.generateChained(); // fallback
  },

  generateLevelQuestions(count) {
    const questions = [];
    const seen = new Set();
    let attempts = 0;
    let zeroAnswerCount = 0;
    const max = this.getMax();

    // Answer distribution buckets: divide [0, max] into 4 zones
    const bucketSize = Math.ceil((max + 1) / 4);
    const bucketCounts = [0, 0, 0, 0];
    const bucketLimit = Math.ceil(count * 0.4); // no bucket > 40%

    // Simple question threshold: operands all < max*0.25 counts as "simple"
    const simpleThreshold = Math.max(5, Math.floor(max * 0.25));
    let simpleCount = 0;
    const simpleLimit = Math.ceil(count * 0.2); // max ~20% simple

    // Distribution: 20% addition, 20% subtraction, 15% carry/borrow, 27% chained(2-op), 18% long chained(3-op)
    while (questions.length < count && attempts < 3000) {
      attempts++;
      const roll = Math.random();
      let q;
      if (roll < 0.20)      q = this.generateAddition();
      else if (roll < 0.40) q = this.generateSubtraction();
      else if (roll < 0.48) q = this.generateCarryAddition();
      else if (roll < 0.55) q = this.generateBorrowSubtraction();
      else if (roll < 0.82) q = this.generateChained();
      else                  q = this.generateLongChained();

      // Rule: no operand can be 0
      if (q.operands.some(op => op === 0)) continue;

      // Rule: answer=0 max 1 per level
      if (q.answer === 0) {
        if (zeroAnswerCount >= 1) continue;
      }

      // Rule: simple question ratio control
      const isSimple = q.operands.every(op => op < simpleThreshold);
      if (isSimple && simpleCount >= simpleLimit) continue;

      // Rule: answer distribution balance
      const bucket = Math.min(3, Math.floor(q.answer / bucketSize));
      if (bucketCounts[bucket] >= bucketLimit) continue;

      // Dedup
      const key = q.display;
      if (seen.has(key)) continue;

      // All checks passed — add question
      seen.add(key);
      if (q.answer === 0) zeroAnswerCount++;
      if (isSimple) simpleCount++;
      bucketCounts[bucket]++;
      questions.push(q);
    }
    // Shuffle to mix question types
    for (let i = questions.length - 1; i > 0; i--) {
      const j = randomInt(0, i);
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    return questions;
  }
};

// ===== Reward Engine =====
const RewardEngine = {
  types: ['贴纸', '称号', '动作特效'],
  themes: ['星星', '彩虹', '胡萝卜', '月亮', '火箭', '海盗', '公主', '恐龙'],
  rarities: [
    { key: 'common', label: '普通', weight: 65 },
    { key: 'rare', label: '稀有', weight: 28 },
    { key: 'super', label: '超稀有', weight: 7 }
  ],

  encouragements: {
    common: ['每天进步一点点！','数学小达人！','继续加油哦！','你做得很棒！','又完成了一关！','坚持就是胜利！','你很认真呢！','学习使你更强大！','小小数学家！','一步一个脚印！'],
    rare: ['数学小能手！','太厉害了！','你的努力有回报了！','越来越棒了！','思维敏捷，了不起！','你是学习的榜样！','进步神速！','聪明的小脑袋！','你让小奶龙骄傲！','运气和实力并存！'],
    super: ['你是最棒的！','不可思议的天才！','超级数学之星！','了不起了不起！','简直是数学精灵！','你拥有超能力！','传说中的学霸！','全世界最厉害的小朋友！','数学王国的勇士！','你闪闪发光！']
  },

  emojiPool: ['🎁','✨','🎊','🌟','💎','🌈','🧸','🎉','🌊','🎵','🦋','🍀','🎀','🏆'],

  pickWeightedRarity() {
    const total = this.rarities.reduce((sum, item) => sum + item.weight, 0);
    let roll = Math.random() * total;
    for (const item of this.rarities) {
      if (roll < item.weight) return item;
      roll -= item.weight;
    }
    return this.rarities[0];
  },

  createReward() {
    const rarity = this.pickWeightedRarity();
    const type = pickRandom(this.types);
    const theme = pickRandom(this.themes);
    const key = `${rarity.key}|${type}|${theme}`;
    return {
      rarityKey: rarity.key,
      rarityLabel: rarity.label,
      type,
      theme,
      key,
      label: `${rarity.label}·${theme}${type}`
    };
  },

  draw() {
    const last = GS.rewardHistory[GS.rewardHistory.length - 1];
    for (let i = 0; i < 8; i++) {
      const reward = this.createReward();
      if (!last || reward.key !== last.key) return reward;
    }
    return this.createReward();
  },

  getEncouragement(rarityKey) {
    const pool = this.encouragements[rarityKey] || this.encouragements.common;
    return pickRandom(pool);
  },

  getShuffledEmojis(count) {
    const pool = [...this.emojiPool];
    // Fisher-Yates shuffle
    for (let i = pool.length - 1; i > 0; i--) {
      const j = randomInt(0, i);
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, count || 8);
  }
};

// ===== Screen Manager =====
const ScreenManager = {
  show(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screenId).classList.add('active');
    GS.currentScreen = screenId;
    AudioManager.onScreenChanged(screenId);
  }
};

// ===== Audio Manager =====
const AudioManager = {
  phrases: {
    correct: ['太棒了！', '你真厉害！', '答对了！好聪明！', '非常好！', '就是这样！', '你是最棒的！', '继续加油！', '真了不起！', '厉害厉害！'],
    correctRetry: ['不放弃，真棒！', '坚持就是胜利！', '好样的，答对了！'],
    wrongRetry: ['再试一次！', '别着急，再想想！', '加油，你可以的！'],
    wrongFinal: ['没关系，下一题加油！', '没关系，下次一定行！', '记住答案，下次就会了！'],
    timeout: ['时间到了！'],
    levelComplete: ['太厉害了！一关通过！', '你真棒！休息一下吧！'],
    gameComplete: ['全部通关了！你太厉害了！你是最棒的数学小达人！']
  },

  sfx: {
    clickDigit: ['sound/mp3/click.bubble.mp3'],
    clickAction: ['sound/mp3/click.common.button.mp3'],
    correctFirst: ['sound/mp3/Eliminate1.mp3', 'sound/mp3/Eliminate2.mp3', 'sound/mp3/Eliminate3.mp3', 'sound/mp3/Eliminate4.mp3'],
    correctRetry: ['sound/mp3/Eliminate5.mp3', 'sound/mp3/Eliminate6.mp3', 'sound/mp3/Eliminate7.mp3', 'sound/mp3/Eliminate8.mp3'],
    wrongRetry: ['sound/mp3/board.mp3'],
    wrongFinal: ['sound/mp3/ice_break.mp3'],
    levelComplete: ['sound/mp3/money.mp3'],
    rewardOpen: ['sound/mp3/Eliminate6.mp3', 'sound/mp3/Eliminate7.mp3'],
    rewardRevealCommon: ['sound/mp3/money.mp3'],
    rewardRevealRare: ['sound/mp3/money.mp3'],
    rewardRevealSuper: ['sound/mp3/unbelievable.mp3']
  },

  voiceClips: {
    correct: ['sound/mp3/good.mp3', 'sound/mp3/great.mp3', 'sound/mp3/amazing.mp3', 'sound/mp3/excellent.mp3'],
    correctRetry: ['sound/mp3/great.mp3', 'sound/mp3/amazing.mp3', 'sound/mp3/excellent.mp3'],
    levelComplete: ['sound/mp3/excellent.mp3', 'sound/mp3/unbelievable.mp3'],
    gameComplete: ['sound/mp3/unbelievable.mp3']
  },

  bgm: {
    game: 'sound/mp3/GameSceneBGM.mp3',
    world: 'sound/mp3/WorldSceneBGM.mp3'
  },

  initAudioContext() {
    if (!GS.audioCtx) {
      GS.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (GS.audioCtx.state === 'suspended') {
      GS.audioCtx.resume();
    }
  },

  playPath(path, { volume = 0.5, loop = false, onError = null } = {}) {
    if (!GS.audioEnabled) return false;
    try {
      const audio = new Audio(path);
      audio.preload = 'auto';
      audio.volume = volume;
      audio.loop = loop;
      const promise = audio.play();
      if (promise && typeof promise.catch === 'function') {
        promise.catch(() => {
          if (typeof onError === 'function') onError();
        });
      }
      return true;
    } catch (err) {
      if (typeof onError === 'function') onError();
      return false;
    }
  },

  playFromPool(pool, opts = {}, fallback = null) {
    if (!pool || pool.length === 0) {
      if (typeof fallback === 'function') fallback();
      return;
    }
    const selected = pickRandom(pool);
    this.playPath(selected, {
      ...opts,
      onError: () => {
        if (typeof fallback === 'function') fallback();
      }
    });
  },

  initSpeech() {
    if (!('speechSynthesis' in window)) return;
    const loadVoices = () => {
      const voices = speechSynthesis.getVoices();
      const zhVoices = voices.filter(v => v.lang === 'zh-CN' || v.lang.startsWith('zh'));
      GS.zhVoice = zhVoices.find(v => /female|女|ting.ting|meijia|lili|yaoyao/i.test(v.name)) ||
                    zhVoices[0] || null;
      GS.speechReady = true;
    };
    if (speechSynthesis.getVoices().length > 0) loadVoices();
    speechSynthesis.addEventListener('voiceschanged', loadVoices);
  },

  speak(text) {
    if (!GS.audioEnabled || !('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const doSpeak = () => {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.pitch = 1.5;
      utter.rate = 1.05;
      utter.volume = 1.0;
      if (GS.zhVoice) utter.voice = GS.zhVoice;
      speechSynthesis.speak(utter);
    };
    // Delay allows cancel() to fully complete before new speak()
    setTimeout(doSpeak, 200);
  },

  speakCategory(category) {
    const voicePool = this.voiceClips[category];
    if (voicePool && voicePool.length > 0) {
      this.playFromPool(voicePool, { volume: 0.85 }, () => {
        const pool = this.phrases[category];
        if (!pool || pool.length === 0) return;
        let idx;
        do { idx = randomInt(0, pool.length - 1); } while (pool.length > 1 && idx === GS.lastPhraseIndex);
        GS.lastPhraseIndex = idx;
        this.speak(pool[idx]);
      });
      return;
    }

    const pool = this.phrases[category];
    if (!pool || pool.length === 0) return;
    let idx;
    do { idx = randomInt(0, pool.length - 1); } while (pool.length > 1 && idx === GS.lastPhraseIndex);
    GS.lastPhraseIndex = idx;
    this.speak(pool[idx]);
  },

  playTone(freq, duration, type, vol) {
    if (!GS.audioEnabled || !GS.audioCtx) return;
    const ctx = GS.audioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  },

  playCorrect() {
    const pool = GS.isRetry ? this.sfx.correctRetry : this.sfx.correctFirst;
    this.playFromPool(pool, { volume: 0.5 }, () => {
      if (!GS.audioCtx) return;
      this.playTone(523, 0.15, 'sine', 0.15);
      setTimeout(() => this.playTone(659, 0.2, 'sine', 0.15), 150);
    });
  },

  playWrong(isFinal = false) {
    const pool = isFinal ? this.sfx.wrongFinal : this.sfx.wrongRetry;
    this.playFromPool(pool, { volume: 0.45 }, () => {
      if (!GS.audioCtx) return;
      this.playTone(330, 0.15, 'square', 0.08);
      setTimeout(() => this.playTone(262, 0.2, 'square', 0.08), 150);
    });
  },

  playClick(type = 'digit') {
    const pool = type === 'action' ? this.sfx.clickAction : this.sfx.clickDigit;
    this.playFromPool(pool, { volume: 0.35 }, () => {
      if (!GS.audioCtx) return;
      this.playTone(800, 0.03, 'sine', 0.08);
    });
  },

  playLevelComplete() {
    this.playFromPool(this.sfx.levelComplete, { volume: 0.5 }, () => {
      if (!GS.audioCtx) return;
      const notes = [523, 659, 784, 1047];
      notes.forEach((f, i) => {
        setTimeout(() => this.playTone(f, 0.2, 'sine', 0.12), i * 120);
      });
    });
  },

  playGameComplete() {
    if (!GS.audioCtx) return;
    const notes = [523, 587, 659, 784, 880, 1047];
    notes.forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.25, 'sine', 0.12), i * 130);
    });
  },

  playRewardOpen() {
    this.playFromPool(this.sfx.rewardOpen, { volume: 0.45 });
  },

  playRewardReveal(rarityKey) {
    const pool = rarityKey === 'super'
      ? this.sfx.rewardRevealSuper
      : rarityKey === 'rare'
        ? this.sfx.rewardRevealRare
        : this.sfx.rewardRevealCommon;
    this.playFromPool(pool, { volume: 0.5 });
  },

  onScreenChanged(screenId) {
    const target = screenId === 'game' ? 'game' : 'world';
    this.switchBgm(target);
  },

  switchBgm(key) {
    const src = this.bgm[key];
    if (!src) return;

    if (!GS.audioEnabled) {
      if (GS.bgmAudio) GS.bgmAudio.pause();
      GS.currentBgmKey = key;
      return;
    }

    if (GS.currentBgmKey === key && GS.bgmAudio) {
      if (GS.bgmAudio.paused) GS.bgmAudio.play().catch(() => {});
      return;
    }

    if (GS.bgmAudio) {
      GS.bgmAudio.pause();
      GS.bgmAudio.currentTime = 0;
    }

    GS.bgmAudio = new Audio(src);
    GS.bgmAudio.loop = true;
    GS.bgmAudio.volume = 0.1;
    GS.currentBgmKey = key;
    GS.bgmAudio.play().catch(() => {
      GS.bgmAudio = null;
    });
  },

  stopBgm() {
    if (GS.bgmAudio) {
      GS.bgmAudio.pause();
      GS.bgmAudio.currentTime = 0;
    }
  }
};

// ===== Timer Controller =====
const TimerController = {
  start() {
    GS.questionStartTime = Date.now();
    this.update();
    GS.timerInterval = setInterval(() => this.update(), 100);
  },

  stop() {
    if (GS.timerInterval) {
      clearInterval(GS.timerInterval);
      GS.timerInterval = null;
    }
  },

  reset() {
    this.stop();
    this.start();
  },

  getElapsed() {
    if (!GS.questionStartTime) return 0;
    return (Date.now() - GS.questionStartTime) / 1000;
  },

  update() {
    const elapsed = this.getElapsed();
    const remaining = Math.max(0, GS.timePerQuestion - elapsed);
    const pct = remaining / GS.timePerQuestion;

    const bar = document.getElementById('timer-bar');
    bar.style.width = (pct * 100) + '%';
    bar.classList.remove('warn', 'danger');
    if (remaining <= 3) bar.classList.add('danger');
    else if (remaining <= 5) bar.classList.add('warn');

    if (remaining <= 0) {
      this.stop();
      GameController.onTimerExpired();
    }
  }
};

// ===== Input Handler =====
const InputHandler = {
  init() {
    document.getElementById('keypad').addEventListener('click', (e) => {
      e.preventDefault();
      const btn = e.target.closest('.key-btn');
      if (!btn || btn.disabled) return;
      const key = btn.dataset.key;
      this.handleKey(key);
    });

    // Physical keyboard support
    document.addEventListener('keydown', (e) => {
      if (GS.currentScreen !== 'game') return;
      if (e.key >= '0' && e.key <= '9') this.handleKey(e.key);
      else if (e.key === 'Backspace') this.handleKey('delete');
      else if (e.key === 'Enter') this.handleKey('confirm');
    });
  },

  handleKey(key) {
    if (GS.inputLocked) return;

    if (key === 'delete') {
      AudioManager.playClick('action');
      GS.currentInput = GS.currentInput.slice(0, -1);
      UIRenderer.renderAnswer(GS.currentInput);
    } else if (key === 'confirm') {
      if (GS.currentInput === '') return;
      AudioManager.playClick('action');
      GameController.submitAnswer(parseInt(GS.currentInput, 10));
    } else {
      // Digit 0-9
      if (GS.currentInput.length >= (ModeConfig[GS.mode] || ModeConfig.within20).maxDigits) return;
      AudioManager.playClick('digit');
      GS.currentInput += key;
      UIRenderer.renderAnswer(GS.currentInput);

      const q = GS.questions[GS.currentQuestion - 1];
      if (!q) return;
      const answerDigits = String(Math.abs(q.answer)).length;
      if (GS.currentInput.length >= answerDigits) {
        GameController.submitAnswer(parseInt(GS.currentInput, 10));
      }
    }
  }
};

// ===== Game Controller =====
const GameController = {
  startGame(mode) {
    try { AudioManager.initAudioContext(); } catch(e) {}
    try { AudioManager.initSpeech(); } catch(e) {}

    GS.mode = mode;
    GS.currentLevel = 1;
    GS.rewardHistory = [];
    GS.overallStats = { levels: [], gameStartTime: Date.now() };

    this.startLevel();
  },

  startLevel() {
    GS.currentQuestion = 0;
    GS.questions = QuestionGenerator.generateLevelQuestions(GS.questionsPerLevel);
    GS.wrongQuestions = [];
    GS.levelStats = { correct: 0, wrong: 0, totalTime: 0, firstTryCorrect: 0 };
    GS.currentReward = null;
    GS.pendingLevelTransition = GS.currentLevel >= GS.totalLevels ? 'game-complete' : 'next-level';
    document.getElementById('level-label').textContent = `第${GS.currentLevel}关`;
    ScreenManager.show('game');
    this.nextQuestion();
  },

  nextQuestion() {
    GS.currentQuestion++;
    if (GS.currentQuestion > GS.questionsPerLevel) {
      this.onLevelComplete();
      return;
    }

    GS.currentInput = '';
    GS.lastWrongInput = null;
    GS.isRetry = false;
    GS.inputLocked = false;

    const q = GS.questions[GS.currentQuestion - 1];
    UIRenderer.renderQuestion(q);
    UIRenderer.renderAnswer('');
    UIRenderer.hideCorrectAnswer();
    UIRenderer.renderProgress(GS.currentQuestion - 1, GS.questionsPerLevel);
    UIRenderer.setCharacterState(null); // idle
    UIRenderer.setKeypadEnabled(true);

    TimerController.start();
  },

  submitAnswer(answer) {
    if (GS.currentScreen !== 'game' || GS.inputLocked) return;
    GS.inputLocked = true;

    const q = GS.questions[GS.currentQuestion - 1];
    if (!q) {
      GS.inputLocked = false;
      return;
    }
    const elapsed = TimerController.getElapsed();
    TimerController.stop();

    if (answer === q.answer) {
      // Correct!
      GS.levelStats.correct++;
      GS.levelStats.totalTime += elapsed;
      if (!GS.isRetry) GS.levelStats.firstTryCorrect++;

      UIRenderer.flashAnswer(true);
      UIRenderer.setCharacterState('happy');
      UIRenderer.showConfetti();
      UIRenderer.renderProgress(GS.currentQuestion, GS.questionsPerLevel);
      AudioManager.playCorrect();

      if (GS.isRetry) {
        UIRenderer.showToast('答对了！', 'correct');
        AudioManager.speakCategory('correctRetry');
      } else {
        UIRenderer.showToast('答对了！', 'correct');
        AudioManager.speakCategory('correct');
      }

      UIRenderer.setKeypadEnabled(false);
      setTimeout(() => this.nextQuestion(), 1500);

    } else if (!GS.isRetry) {
      // First wrong — record to wrong questions immediately
      GS.isRetry = true;
      GS.lastWrongInput = answer;
      GS.currentInput = '';

      GS.wrongQuestions.push({
        question: q.display,
        userAnswer: answer !== null ? String(answer) : '超时',
        correctAnswer: String(q.answer)
      });

      UIRenderer.flashAnswer(false);
      UIRenderer.shakeQuestion();
      UIRenderer.setCharacterState('sad');
      AudioManager.playWrong(false);
      UIRenderer.showToast('再试一次！', 'retry');
      AudioManager.speakCategory('wrongRetry');
      UIRenderer.setKeypadEnabled(false);

      setTimeout(() => {
        UIRenderer.renderAnswer('');
        UIRenderer.setCharacterState(null);
        GS.inputLocked = false;
        UIRenderer.setKeypadEnabled(true);
        TimerController.reset();
      }, 600);

    } else {
      // Second wrong — update existing wrong record if answer changed
      GS.levelStats.wrong++;
      GS.levelStats.totalTime += elapsed;

      UIRenderer.flashAnswer(false);
      UIRenderer.shakeQuestion();
      UIRenderer.setCharacterState('sad');
      UIRenderer.showCorrectAnswer(q.answer);
      UIRenderer.renderProgress(GS.currentQuestion, GS.questionsPerLevel);
      AudioManager.playWrong(true);
      AudioManager.speakCategory('wrongFinal');
      UIRenderer.showToast('没关系！', 'wrong');

      UIRenderer.setKeypadEnabled(false);
      setTimeout(() => this.nextQuestion(), 2500);
    }
  },

  onTimerExpired() {
    if (GS.currentScreen !== 'game' || GS.inputLocked) return;
    const q = GS.questions[GS.currentQuestion - 1];
    if (!q) return;

    if (!GS.isRetry) {
      // First timeout -> retry, record wrong question immediately
      GS.isRetry = true;
      GS.currentInput = '';

      GS.wrongQuestions.push({
        question: q.display,
        userAnswer: '超时',
        correctAnswer: String(q.answer)
      });

      GS.inputLocked = true;
      UIRenderer.setCharacterState('sad');
      AudioManager.playWrong(false);
      UIRenderer.showToast('时间到！', 'retry');
      AudioManager.speakCategory('timeout');
      UIRenderer.setKeypadEnabled(false);

      setTimeout(() => {
        UIRenderer.renderAnswer('');
        UIRenderer.setCharacterState(null);
        GS.inputLocked = false;
        UIRenderer.setKeypadEnabled(true);
        TimerController.reset();
      }, 800);

    } else {
      // Second timeout — wrong already recorded on first attempt
      GS.inputLocked = true;
      GS.levelStats.wrong++;
      GS.levelStats.totalTime += GS.timePerQuestion;

      UIRenderer.setCharacterState('sad');
      UIRenderer.showCorrectAnswer(q.answer);
      UIRenderer.renderProgress(GS.currentQuestion, GS.questionsPerLevel);
      AudioManager.playWrong(true);
      AudioManager.speakCategory('wrongFinal');
      UIRenderer.showToast('时间到！', 'wrong');

      UIRenderer.setKeypadEnabled(false);
      setTimeout(() => this.nextQuestion(), 2500);
    }
  },

  onLevelComplete() {
    TimerController.stop();
    GS.inputLocked = true;
    if ('speechSynthesis' in window) speechSynthesis.cancel();

    GS.overallStats.levels.push({ ...GS.levelStats });
    GS.currentReward = RewardEngine.draw();
    GS.rewardHistory.push(GS.currentReward);

    UIRenderer.renderLevelStats(GS.levelStats, GS.currentLevel);
    UIRenderer.renderWrongReview(GS.wrongQuestions);
    UIRenderer.setLevelActionButtons(GS.currentLevel >= GS.totalLevels);
    UIRenderer.prepareRewardScreen(GS.currentLevel);

    AudioManager.playLevelComplete();
    AudioManager.speakCategory('levelComplete');
    ScreenManager.show('reward');
  },

  drawRewardAndReveal() {
    if (GS.currentScreen !== 'reward' || !GS.currentReward) return;
    const drawBtn = document.getElementById('btn-reward-draw');
    if (drawBtn.disabled) return;
    drawBtn.disabled = true;
    AudioManager.playClick('action');
    AudioManager.playRewardOpen();

    const rewardBox = document.getElementById('reward-box');
    // Stop nudge, start violent shake
    rewardBox.className = 'reward-box shaking';

    // After shake, start emoji rotation
    setTimeout(() => {
      rewardBox.className = 'reward-box';
      const emojis = RewardEngine.getShuffledEmojis(8);
      let count = 0;
      const interval = setInterval(() => {
        rewardBox.textContent = emojis[count % emojis.length];
        count++;
        if (count >= 6) {
          clearInterval(interval);
        }
      }, 140);
    }, 650);

    // Reveal after shake + rotation
    setTimeout(() => {
      UIRenderer.revealReward(GS.currentReward);
      AudioManager.playRewardReveal(GS.currentReward.rarityKey);
    }, 1500);
  },

  finishRewardAndShowLevelComplete() {
    ScreenManager.show('level-complete');
  },

  continueNextLevel() {
    AudioManager.playClick('action');
    if (GS.currentLevel >= GS.totalLevels) {
      UIRenderer.renderOverallStats(GS.overallStats);
      AudioManager.playGameComplete();
      setTimeout(() => {
        AudioManager.speakCategory('gameComplete');
        ScreenManager.show('game-complete');
      }, 600);
      return;
    }

    GS.currentLevel++;
    this.startLevel();
  },

  restThenContinue() {
    AudioManager.playClick('action');
    ScreenManager.show('rest');
  },

  restartGame() {
    AudioManager.playClick('action');
    ScreenManager.show('start');
  }
};

// ===== Event Bindings =====
document.addEventListener('DOMContentLoaded', () => {

  // Auto-play BGM on page load; fallback to first user interaction if blocked
  let firstClickHandled = false;

    try { AudioManager.initAudioContext(); } catch(e) {}
    try { AudioManager.initSpeech(); } catch(e) {}
    AudioManager.switchBgm('world');

  tryAutoPlayBgm();

  const handleFirstClick = () => {

    firstClickHandled = true;
    tryAutoPlayBgm();
    document.removeEventListener('click', handleFirstClick, true);
    document.removeEventListener('touchstart', handleFirstClick, true);

// ===== Test Suite =====
function runTests() {
  let passed = 0, failed = 0;
  const results = [];

  function assert(condition, msg) {
    if (condition) {
      passed++;
    } else {
      failed++;
      results.push('FAIL: ' + msg);
      console.error('FAIL:', msg);
    }
  }

  // Helper: test a mode
  function testMode(mode) {
    const prevMode = GS.mode;
    GS.mode = mode;
    const max = ModeConfig[mode].max;
    const prefix = `[${mode}]`;

    // TC-01: Addition — operands >= 3
    for (let i = 0; i < 500; i++) {
      const q = QuestionGenerator.generateAddition();
      assert(q.answer >= 0 && q.answer <= max, `${prefix} TC-01: Addition answer ${q.answer} out of [0,${max}]`);
      assert(q.operands[0] >= 3 && q.operands[1] >= 3, `${prefix} TC-01: Addition operand too small: ${q.operands}`);
      assert(q.operands[0] + q.operands[1] === q.answer, `${prefix} TC-01: ${q.operands[0]}+${q.operands[1]} != ${q.answer}`);
    }

    // TC-02: Subtraction — a >= 5, b >= 2
    for (let i = 0; i < 500; i++) {
      const q = QuestionGenerator.generateSubtraction();
      assert(q.answer >= 0, `${prefix} TC-02: Subtraction answer ${q.answer} negative`);
      assert(q.answer <= max, `${prefix} TC-02: Subtraction answer ${q.answer} > ${max}`);
      assert(q.operands[0] >= 5, `${prefix} TC-02: Subtraction a=${q.operands[0]} < 5`);
      assert(q.operands[1] >= 2, `${prefix} TC-02: Subtraction b=${q.operands[1]} < 2`);
      assert(q.operands[0] - q.operands[1] === q.answer, `${prefix} TC-02: ${q.operands[0]}-${q.operands[1]} != ${q.answer}`);
    }

    // TC-02b: Carry Addition — operands >= 3
    for (let i = 0; i < 200; i++) {
      const q = QuestionGenerator.generateCarryAddition();
      assert(q.answer >= 0 && q.answer <= max, `${prefix} TC-02b: Carry addition answer ${q.answer} out of range`);
      assert(q.operands[0] >= 3 && q.operands[1] >= 3, `${prefix} TC-02b: Carry operand too small: ${q.operands}`);
      assert(q.operands[0] + q.operands[1] === q.answer, `${prefix} TC-02b: computation wrong`);
    }

    // TC-02c: Borrow Subtraction — b >= 2
    for (let i = 0; i < 200; i++) {
      const q = QuestionGenerator.generateBorrowSubtraction();
      assert(q.answer >= 0 && q.answer <= max, `${prefix} TC-02c: Borrow subtraction answer ${q.answer} out of range`);
      assert(q.operands[1] >= 2, `${prefix} TC-02c: Borrow b=${q.operands[1]} < 2`);
      assert(q.operands[0] - q.operands[1] === q.answer, `${prefix} TC-02c: computation wrong`);
    }

    // TC-03: Chained (2-op) — all operands >= 2
    for (let i = 0; i < 500; i++) {
      const q = QuestionGenerator.generateChained();
      assert(q.operands.length === 3 && q.operators.length === 2, `${prefix} TC-03: structure wrong`);
      assert(q.operands.every(op => op >= 2), `${prefix} TC-03: Chained operand too small: ${q.operands}`);
      let mid = q.operators[0] === '+' ? q.operands[0] + q.operands[1] : q.operands[0] - q.operands[1];
      assert(mid >= 0 && mid <= max, `${prefix} TC-03: Intermediate ${mid} out of [0,${max}]`);
      let final_answer = q.operators[1] === '+' ? mid + q.operands[2] : mid - q.operands[2];
      assert(final_answer >= 0 && final_answer <= max, `${prefix} TC-03: Final ${final_answer} out of [0,${max}]`);
      assert(final_answer === q.answer, `${prefix} TC-03: Calculated ${final_answer} != ${q.answer}`);
    }

    // TC-03b: Long Chained (3-op) — all operands >= 2
    for (let i = 0; i < 300; i++) {
      const q = QuestionGenerator.generateLongChained();
      assert(q.operands.length === 4 && q.operators.length === 3, `${prefix} TC-03b: structure wrong`);
      assert(q.operands.every(op => op >= 2), `${prefix} TC-03b: Long chained operand too small: ${q.operands}`);
      let val = q.operands[0];
      for (let j = 0; j < q.operators.length; j++) {
        val = q.operators[j] === '+' ? val + q.operands[j+1] : val - q.operands[j+1];
        assert(val >= 0 && val <= max, `${prefix} TC-03b: Intermediate step ${j} val=${val} out of range`);
      }
      assert(val === q.answer, `${prefix} TC-03b: Calculated ${val} != ${q.answer}`);
    }

    // TC-04: No duplicates in a level
    const levelQ = QuestionGenerator.generateLevelQuestions(20);
    const keys = new Set(levelQ.map(q => q.display));
    assert(keys.size === 20, `${prefix} TC-04: Duplicates found, ${keys.size} unique of 20`);
    assert(levelQ.length === 20, `${prefix} TC-04: Expected 20 questions, got ${levelQ.length}`);

    // TC-05: Type distribution (wider ranges for new mix)
    let addCount = 0, subCount = 0, chainCount = 0;
    for (let round = 0; round < 5; round++) {
      const qs = QuestionGenerator.generateLevelQuestions(20);
      qs.forEach(q => {
        if (q.operators.length >= 2) chainCount++;
        else if (q.operators[0] === '+') addCount++;
        else subCount++;
      });
    }
    const total = addCount + subCount + chainCount;
    // Chained should be >= 30%
    assert(chainCount / total >= 0.25, `${prefix} TC-05: Chained ratio ${(chainCount/total*100).toFixed(1)}% < 25%`);

    // TC-06: Answer distribution
    const qs6 = QuestionGenerator.generateLevelQuestions(20);
    const answerCounts = {};
    qs6.forEach(q => { answerCounts[q.answer] = (answerCounts[q.answer] || 0) + 1; });
    const maxSameAnswer = Math.max(...Object.values(answerCounts));
    assert(maxSameAnswer <= 5, `${prefix} TC-06: Max same answer count ${maxSameAnswer} > 5`);

    // TC-07: No trivially simple questions — minimum operand checks
    for (let i = 0; i < 500; i++) {
      const q = QuestionGenerator.generateLevelQuestions(1)[0];
      const allMinTwo = q.operands.every(op => op >= 2);
      assert(allMinTwo, `${prefix} TC-07: Operand too small in ${q.display}`);
    }

    // TC-08: No operand is 0
    for (let i = 0; i < 500; i++) {
      const q = QuestionGenerator.generateLevelQuestions(1)[0];
      const noZeroOp = q.operands.every(op => op > 0);
      assert(noZeroOp, `${prefix} TC-08: Zero operand found in ${q.display}: ${q.operands}`);
    }

    // TC-09: Answer=0 at most 1 per level
    for (let round = 0; round < 10; round++) {
      const qs = QuestionGenerator.generateLevelQuestions(20);
      const zeroCount = qs.filter(q => q.answer === 0).length;
      assert(zeroCount <= 1, `${prefix} TC-09: ${zeroCount} zero-answer questions in one level (max 1)`);
    }

    // TC-10: Simple questions ratio
    let simpleQCount = 0, totalQCount = 0;
    const simpleThresh = Math.max(5, Math.floor(max * 0.25));
    for (let round = 0; round < 5; round++) {
      const qs = QuestionGenerator.generateLevelQuestions(20);
      qs.forEach(q => {
        totalQCount++;
        if (q.operands.every(op => op < simpleThresh)) simpleQCount++;
      });
    }
    assert(simpleQCount / totalQCount <= 0.25, `${prefix} TC-10: Simple ratio ${(simpleQCount/totalQCount*100).toFixed(1)}% > 25%`);

    // TC-06b: Answer distribution buckets — no bucket > 40%
    const qs6b = QuestionGenerator.generateLevelQuestions(20);
    const bucketSize6 = Math.ceil((max + 1) / 4);
    const buckets6 = [0, 0, 0, 0];
    qs6b.forEach(q => {
      const b = Math.min(3, Math.floor(q.answer / bucketSize6));
      buckets6[b]++;
    });
    const maxBucket = Math.max(...buckets6);
    assert(maxBucket <= 8, `${prefix} TC-06b: Bucket max ${maxBucket} > 8 (40% of 20) — distribution: ${buckets6}`);

    GS.mode = prevMode;
  }

  // Run tests for all 3 modes
  ['within20', 'within50', 'within100'].forEach(mode => {
    console.log(`Testing mode: ${mode}...`);
    testMode(mode);
  });

  console.log(`\n==============================`);
  console.log(`Tests complete: ${passed} passed, ${failed} failed`);
  console.log(`==============================\n`);
  if (results.length > 0) {
    console.log('Failures:');
    results.forEach(r => console.log('  ' + r));
  }
  return failed === 0;
}

// Tests available via console: runTests()
</script>
